<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital,wght@0,400;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#e9dcc0;
    --parchment-dark:#dccaa0;
    --board:#d9c08f;
    --walnut:#2a1d14;
    --walnut-light:#3e2c1d;
    --planchette:#6b4630;
    --planchette-dark:#4a2f1f;
    --amber:#d4a24c;
    --ink:#231811;
    --ghost:#f3ead2;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% 0%, #1d130c 0%, #0d0805 70%);
    font-family:'EB Garamond', serif;
    color:var(--ghost);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 14px 60px;
  }

  .seance{
    width:100%;
    max-width:640px;
  }

  .eyebrow{
    text-align:center;
    font-family:'Cinzel',serif;
    font-size:11px;
    letter-spacing:0.32em;
    color:var(--amber);
    opacity:0.75;
    margin-bottom:6px;
  }

  h1{
    text-align:center;
    font-family:'Cinzel',serif;
    font-weight:700;
    font-size:clamp(22px,5vw,30px);
    letter-spacing:0.12em;
    margin:0 0 22px;
    color:var(--ghost);
    text-shadow:0 0 18px rgba(212,162,76,0.35);
    animation:flicker 5s infinite ease-in-out;
  }

  @keyframes flicker{
    0%,100%{opacity:1;text-shadow:0 0 18px rgba(212,162,76,0.35);}
    45%{opacity:0.93;text-shadow:0 0 10px rgba(212,162,76,0.2);}
    55%{opacity:1;text-shadow:0 0 24px rgba(212,162,76,0.45);}
    78%{opacity:0.96;}
  }

  .board-frame{
    position:relative;
    padding:18px;
    border-radius:14px;
    background:
      repeating-linear-gradient(115deg, #4a3320 0px, #4a3320 2px, #3a2716 2px, #3a2716 5px),
      linear-gradient(160deg,#3e2c1d,#1f140c);
    box-shadow:
      0 25px 50px -15px rgba(0,0,0,0.7),
      inset 0 0 0 1px rgba(212,162,76,0.15);
  }

  .board{
    position:relative;
    width:100%;
    aspect-ratio:4/3;
    border-radius:6px;
    background:
      radial-gradient(ellipse at 50% 40%, var(--parchment) 0%, var(--parchment-dark) 75%, #c7b27e 100%);
    box-shadow:
      inset 0 0 60px rgba(60,40,15,0.35),
      inset 0 0 0 2px rgba(60,40,15,0.4);
    overflow:hidden;
    touch-action:none;
  }

  .board-title{
    position:absolute;
    top:6%;
    left:50%;
    transform:translateX(-50%);
    font-family:'Cinzel',serif;
    font-weight:700;
    font-size:clamp(20px,4.2vw,32px);
    letter-spacing:0.2em;
    color:var(--ink);
    opacity:0.85;
  }

  .glyph{
    position:absolute;
    transform:translate(-50%,-50%);
    font-family:'Cinzel',serif;
    color:var(--ink);
    opacity:0.82;
    user-select:none;
    white-space:nowrap;
  }

  .glyph.word{
    font-size:clamp(11px,2vw,15px);
    letter-spacing:0.08em;
    display:flex;
    align-items:center;
    gap:4px;
  }

  .glyph.letter, .glyph.digit{
    font-size:clamp(13px,2.6vw,19px);
    font-weight:600;
  }

  .icon{
    width:14px;height:14px;display:inline-block;opacity:0.8;
  }

  .sigil{
    position:absolute;
    left:50%;
    top:84%;
    transform:translate(-50%,-50%);
    width:26px;height:26px;
    opacity:0.55;
  }

  .planchette{
    position:absolute;
    left:50%;
    top:50%;
    width:17%;
    aspect-ratio:1/0.85;
    transform:translate(-50%,-50%) rotate(0deg);
    transition:left 0.55s cubic-bezier(.42,0,.2,1), top 0.55s cubic-bezier(.42,0,.2,1);
    filter:drop-shadow(0 8px 10px rgba(0,0,0,0.4));
    z-index:5;
    pointer-events:none;
  }

  .planchette svg{width:100%;height:100%;display:block;}

  .planchette.thinking{
    animation:hover-circle 3.2s linear infinite;
  }
  @keyframes hover-circle{
    0%{transform:translate(-50%,-50%) translate(0px,0px) rotate(0deg);}
    25%{transform:translate(-50%,-50%) translate(6px,-4px) rotate(3deg);}
    50%{transform:translate(-50%,-50%) translate(0px,-7px) rotate(-2deg);}
    75%{transform:translate(-50%,-50%) translate(-6px,-4px) rotate(2deg);}
    100%{transform:translate(-50%,-50%) translate(0px,0px) rotate(0deg);}
  }

  .planchette.settle{
    animation:settle-wiggle 0.6s ease-out;
  }
  @keyframes settle-wiggle{
    0%{transform:translate(-50%,-50%) rotate(0deg) scale(1.04);}
    50%{transform:translate(-50%,-50%) rotate(-2deg) scale(1);}
    100%{transform:translate(-50%,-50%) rotate(0deg) scale(1);}
  }

  .reading{
    margin-top:18px;
    min-height:34px;
    text-align:center;
    font-family:'Cinzel',serif;
    font-size:clamp(15px,4vw,20px);
    letter-spacing:0.18em;
    color:var(--amber);
    text-shadow:0 0 12px rgba(212,162,76,0.4);
  }

  .transcript{
    margin-top:10px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  .entry{
    opacity:0;
    animation:rise 0.5s ease forwards;
  }
  @keyframes rise{
    from{opacity:0;transform:translateY(6px);}
    to{opacity:1;transform:translateY(0);}
  }

  .q{
    font-size:15px;
    color:#bfae8d;
    font-style:italic;
  }
  .q::before{content:"You ask — ";color:#7e6f53;font-style:normal;}

  .a{
    margin-top:4px;
    font-size:18px;
    color:var(--ghost);
    font-style:italic;
    letter-spacing:0.02em;
    border-left:2px solid rgba(212,162,76,0.4);
    padding-left:12px;
  }
  .a::before{content:"The board says — ";color:var(--amber);font-style:normal;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.15em;display:block;margin-bottom:3px;}

  form{
    margin-top:22px;
    display:flex;
    gap:8px;
  }

  input{
    flex:1;
    padding:14px 16px;
    border-radius:8px;
    border:1px solid rgba(212,162,76,0.3);
    background:#160f09;
    color:var(--ghost);
    font-family:'EB Garamond',serif;
    font-size:16px;
    font-style:italic;
  }
  input::placeholder{color:#7e6f53;}
  input:focus{outline:2px solid var(--amber);outline-offset:1px;}

  button{
    padding:14px 20px;
    border-radius:8px;
    border:1px solid rgba(212,162,76,0.45);
    background:linear-gradient(160deg,var(--planchette),var(--planchette-dark));
    color:var(--ghost);
    font-family:'Cinzel',serif;
    font-size:13px;
    letter-spacing:0.12em;
    cursor:pointer;
  }
  button:disabled{opacity:0.5;cursor:not-allowed;}
  button:focus-visible{outline:2px solid var(--amber);}

  @media (prefers-reduced-motion: reduce){
    .planchette, h1, .entry{animation:none !important;}
    .planchette{transition:none !important;}
  }
</style>
</head>
<body>
<div class="seance">
  <div class="eyebrow">an oracle, not an assistant</div>
  <h1>Ask the Board</h1>

  <div class="board-frame">
    <div class="board" id="board">
      <div class="board-title">OUIJA</div>
      <!-- letters injected by JS -->
      <div class="planchette thinking" id="planchette">
        <svg viewBox="0 0 100 85">
          <path d="M50 4 L92 58 Q96 68 86 74 L62 80 Q50 84 38 80 L14 74 Q4 68 8 58 Z"
                fill="#6b4630" stroke="#3a2515" stroke-width="2"/>
          <circle cx="50" cy="50" r="13" fill="none" stroke="#3a2515" stroke-width="2.5"/>
          <circle cx="50" cy="50" r="13" fill="#e9dcc0" opacity="0.18"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="reading" id="reading" aria-live="polite"></div>

  <div class="transcript" id="transcript"></div>

  <form id="askForm">
    <input id="askInput" type="text" placeholder="Speak your question…" autocomplete="off" maxlength="160">
    <button type="submit" id="askBtn">Ask</button>
  </form>
</div>

<script>
(function(){
  const board = document.getElementById('board');
  const lettersLayer = document.createElement('div');
  board.appendChild(lettersLayer);
  const planchette = document.getElementById('planchette');
  const reading = document.getElementById('reading');
  const transcript = document.getElementById('transcript');
  const form = document.getElementById('askForm');
  const input = document.getElementById('askInput');
  const askBtn = document.getElementById('askBtn');

  const positions = {}; // char -> {x,y} in percent

  function sunIcon(){
    return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="12" cy="12" r="4"/>
      <g stroke-linecap="round">
        <line x1="12" y1="1" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="23"/>
        <line x1="1" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="23" y2="12"/>
        <line x1="4" y1="4" x2="6" y2="6"/><line x1="18" y1="18" x2="20" y2="20"/>
        <line x1="20" y1="4" x2="18" y2="6"/><line x1="6" y1="18" x2="4" y2="20"/>
      </g></svg>`;
  }
  function moonIcon(){
    return `<svg class="icon" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20 12.5A8.5 8.5 0 1 1 11.5 4a7 7 0 0 0 8.5 8.5Z"/></svg>`;
  }

  function place(el, x, y){
    el.style.left = x + '%';
    el.style.top = y + '%';
  }

  function addGlyph(cls, html, x, y, key){
    const el = document.createElement('div');
    el.className = 'glyph ' + cls;
    el.innerHTML = html;
    place(el, x, y);
    lettersLayer.appendChild(el);
    if(key) positions[key] = {x,y};
    return el;
  }

  // YES / NO with sun & moon
  addGlyph('word', sunIcon() + 'YES', 17, 20, 'YES');
  addGlyph('word', 'NO' + moonIcon(), 83, 20, 'NO');

  // Alphabet rows, gently bowed like a real board
  function layRow(chars, baseY, amp, x0, x1, clsName){
    const n = chars.length;
    for(let i=0;i<n;i++){
      const t = n === 1 ? 0 : i/(n-1);
      const x = x0 + (x1-x0)*t;
      const y = baseY - amp*Math.sin(Math.PI*t);
      addGlyph(clsName, chars[i], x, y, chars[i]);
    }
  }
  layRow('ABCDEFGHIJKLM'.split(''), 40, 5, 9, 91, 'letter');
  layRow('NOPQRSTUVWXYZ'.split(''), 54, 5, 9, 91, 'letter');
  layRow('1234567890'.split(''), 67, 2.5, 18, 82, 'digit');

  addGlyph('word', 'GOOD', 22, 84, 'GOOD');
  addGlyph('word', 'BYE', 78, 84, 'BYE');

  const sigil = document.createElement('div');
  sigil.className = 'sigil';
  sigil.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#231811" stroke-width="1.4">
    <path d="M12 21s-7-4.4-7-10A4.5 4.5 0 0 1 12 7a4.5 4.5 0 0 1 7 4c0 5.6-7 10-7 10Z"/></svg>`;
  board.appendChild(sigil);

  const CENTER = {x:50, y:48};
  place(planchette, CENTER.x, CENTER.y);

  function setThinking(on){
    planchette.classList.toggle('thinking', on);
  }

  function glideTo(x,y){
    return new Promise(resolve=>{
      planchette.classList.remove('thinking');
      place(planchette, x, y);
      setTimeout(resolve, 560 + Math.random()*120);
    });
  }

  function settle(){
    planchette.classList.add('settle');
    setTimeout(()=>planchette.classList.remove('settle'), 650);
  }

  function sanitize(text){
    return text.toUpperCase().replace(/[^A-Z0-9 ]/g,'').replace(/\s+/g,' ').trim();
  }

  async function spellAnswer(rawText){
    const text = sanitize(rawText) || 'THE BOARD IS SILENT';
    reading.textContent = '';

    if(text === 'YES' || text === 'NO'){
      reading.textContent = text;
      await glideTo(positions[text].x, positions[text].y);
      settle();
      return text;
    }

    let shown = '';
    for(const ch of text){
      if(ch === ' '){
        shown += ' ';
        reading.textContent = shown;
        await new Promise(r=>setTimeout(r, 260));
        continue;
      }
      const pos = positions[ch];
      if(pos){
        await glideTo(pos.x, pos.y);
      }
      shown += ch;
      reading.textContent = shown;
    }
    settle();
    await glideTo(CENTER.x, CENTER.y);
    return text;
  }

  function addEntry(question, answerPromise){
    const entry = document.createElement('div');
    entry.className = 'entry';
    const q = document.createElement('div');
    q.className = 'q';
    q.textContent = question;
    const a = document.createElement('div');
    a.className = 'a';
    a.textContent = '…';
    entry.appendChild(q);
    entry.appendChild(a);
    transcript.appendChild(entry);
    entry.scrollIntoView({behavior:'smooth', block:'end'});
    return a;
  }

  const history = [];

  // Replace this with your deployed Cloudflare Worker URL, e.g.
  // 'https://ouija-oracle-proxy.yoursubdomain.workers.dev'
  const API_ENDPOINT = 'https://api.anthropic.com/v1/messages';

  async function askOracle(question){
    const system = "You are a spirit being consulted through a Ouija board, not an AI assistant — never mention being an AI, a model, or a chatbot. Answer in a cryptic, terse, oracle-like voice: maximum 9 words, no punctuation except spaces, only letters and numbers (the board has no other characters). Prefer YES or NO alone when the question genuinely calls for it. Be evocative, a little unsettling, but ultimately not unkind.";
    const messages = history.concat([{role:'user', content: question}]);

    let response;
    try{
      response = await fetch(API_ENDPOINT, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:1000,
          system: system,
          messages: messages
        })
      });
    }catch(networkErr){
      console.error('Network error reaching the API:', networkErr);
      throw new Error('NETWORK ' + networkErr.message);
    }

    let data;
    try{
      data = await response.json();
    }catch(parseErr){
      console.error('Could not parse API response as JSON:', parseErr);
      throw new Error('PARSE ERROR');
    }

    if(!response.ok){
      console.error('API returned an error:', response.status, data);
      const msg = (data && data.error && data.error.message) ? data.error.message : ('HTTP ' + response.status);
      throw new Error(msg);
    }

    const textBlock = (data.content||[]).find(b=>b.type==='text');
    if(!textBlock){
      console.error('No text block in response:', data);
      throw new Error('EMPTY RESPONSE');
    }
    const text = textBlock.text;
    history.push({role:'user', content:question});
    history.push({role:'assistant', content:text});
    return text;
  }

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const q = input.value.trim();
    if(!q) return;
    input.value = '';
    askBtn.disabled = true;
    input.disabled = true;
    setThinking(true);

    const answerEl = addEntry(q, null);

    let raw;
    try{
      raw = await askOracle(q);
    }catch(err){
      console.error('Oracle error:', err);
      raw = 'ERROR ' + err.message;
    }

    const spelled = await spellAnswer(raw);
    answerEl.textContent = spelled;

    askBtn.disabled = false;
    input.disabled = false;
    input.focus();
  });
})();
</script>
</body>
</html>
